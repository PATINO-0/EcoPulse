name: ecopulse
description: Aplicación móvil para estimación de consumo de combustible usando sensores del teléfono.
publish_to: "none"


version: 1.0.0+1


environment:
  sdk: ">=3.5.0 <4.0.0"


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:   # ← NUEVO
    sdk: flutter


  cupertino_icons: ^1.0.8


  # Estado y arquitectura
  flutter_riverpod: ^2.6.1
  equatable: ^2.0.7


  # Supabase
  supabase_flutter: ^2.10.0


  # Variables de entorno
  flutter_dotenv: ^6.0.1


  # Navegación
  go_router: ^17.2.1


  # Ubicación y mapas
  geolocator: ^13.0.4
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  


  # Sensores móviles
  sensors_plus: ^7.0.0


  # Permisos y conectividad
  permission_handler: ^12.0.1
  connectivity_plus: ^6.1.5


  # Voz, HTTP, persistencia y utilidades
  flutter_tts: ^4.2.3
  http: ^1.3.0
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.6.0


dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0


flutter:
  uses-material-design: true


  assets:
    - .env
    - assets/icons/
    - assets/images/
    - assets/data/